<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Blog_MiraCansada/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mira Cansada - O blog oficial do grupo do Discord" />
    <title>Mira Cansada</title>
    <script>
      // GitHub Pages SPA: restaura rota após redirect do 404.html
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var search = location.search;
        if (search) {
          var p = search.slice(1).split('&').find(function(s){ return s.startsWith('p=/'); });
          if (p) {
            var path = p.slice(2).replace(/~and~/g, '&');
            history.replaceState(null, null, '/Blog_MiraCansada' + path);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
